{% extends "base.html" %}

{% block title %}Mes cartes - GmesPay{% endblock %}

{% block content %}
<div class="container py-4">
    <h2 class="mb-4">Mes cartes virtuelles</h2>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-plus-circle me-2"></i>Créer une carte</h5>
                </div>
                <div class="card-body">
                    <p>Créez une carte virtuelle pour payer en ligne</p>
                    <small class="text-muted">Frais: $3 USD</small>
                    <hr>
                    <button id="createCardBtn" class="btn btn-success w-100">
                        <i class="fas fa-credit-card me-2"></i>Créer ma carte
                    </button>
                </div>
            </div>
        </div>

        <div class="col-md-8 mb-4">
            <div id="cardsList" class="row">
                <div class="col-12 text-center">Chargement...</div>
            </div>
        </div>
    </div>
</div>

<script>
const token = localStorage.getItem('token');

async function loadCards() {
    try {
        const response = await fetch('/api/cards/list', {
            headers: {Authorization: `Bearer ${token}`}
        });
        const data = await response.json();

        const container = document.getElementById('cardsList');
        if (data.cards && data.cards.length > 0) {
            container.innerHTML = data.cards.map(card => `
                <div class="col-md-6 mb-3">
                    <div class="card bg-gradient-dark text-white bg-dark">
                        <div class="card-body">
                            <i class="fab fa-cc-${card.brand === 'Visa' ? 'visa' : 'mastercard'} fa-2x mb-3"></i>
                            <h5>•••• •••• •••• ${card.last4}</h5>
                            <p>Expire: ${card.expiry}</p>
                            <span class="badge ${card.status === 'active' ? 'bg-success' : 'bg-danger'}">
                                ${card.status}
                            </span>
                            ${card.status === 'active' ? `
                                <button class="btn btn-sm btn-danger float-end" onclick="blockCard(${card.id})">
                                    Bloquer
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<div class="col-12"><div class="alert alert-info">Aucune carte. Créez votre première carte !</div></div>';
        }
    } catch (error) {
        console.error('Error:', error);
    }
}

document.getElementById('createCardBtn').addEventListener('click', async () => {
    try {
        const response = await fetch('/api/cards/create', {
            method: 'POST',
            headers: {Authorization: `Bearer ${token}`}
        });

        const result = await response.json();

        if (response.ok) {
            alert(`Carte créée ! ${result.card.brand} se terminant par ${result.card.last4}`);
            alert(`CVV: ${result.card.cvv} - À conserver précieusement !`);
            loadCards();
        } else {
            alert(result.error || 'Erreur lors de la création');
        }
    } catch (error) {
        alert('Erreur réseau');
    }
});

async function blockCard(cardId) {
    if (confirm('Bloquer cette carte ?')) {
        try {
            const response = await fetch(`/api/cards/${cardId}/block`, {
                method: 'POST',
                headers: {Authorization: `Bearer ${token}`}
            });

            if (response.ok) {
                alert('Carte bloquée');
                loadCards();
            } else {
                alert('Erreur');
            }
        } catch (error) {
            alert('Erreur réseau');
        }
    }
}

loadCards();
</script>
{% endblock %}
