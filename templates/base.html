<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GmesPay - {% block title %}Paiements internationaux en Haïti{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand" href="{{ url_for('index') }}">
            <i class="fas fa-credit-card me-2"></i>GmesPay
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <!-- MENU CONTROLÉ PAR JS -->
            <ul class="navbar-nav ms-auto" id="nav"></ul>

        </div>
    </div>
</nav>

<main>
    {% block content %}{% endblock %}
</main>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
        <p>&copy; 2026 GmesPay - Le pont entre l'argent haïtien et les paiements internationaux</p>
        <small>
            <a href="{{ url_for('terms') }}" class="text-white-50">Conditions d'utilisation</a> |
            <a href="{{ url_for('privacy') }}" class="text-white-50">Confidentialité</a> |
            <a href="{{ url_for('contact') }}" class="text-white-50">Contact</a>
        </small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

<!-- AUTH NAVBAR LOGIC -->
<script>
document.addEventListener("DOMContentLoaded", () => {

    const token = localStorage.getItem("token");
    const nav = document.getElementById("nav");

    if (!nav) return;

    if (token) {

        nav.innerHTML = `
            <li class="nav-item">
                <a class="nav-link" href="/dashboard">
                    <i class="fas fa-tachometer-alt"></i> Tableau de bord
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/wallet">
                    <i class="fas fa-wallet"></i> Portefeuille
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/cards">
                    <i class="fas fa-credit-card"></i> Cartes
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/transfer">
                    <i class="fas fa-exchange-alt"></i> Transfert
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="/profile">
                    <i class="fas fa-user"></i> Profil
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-danger" href="#" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Déconnexion
                </a>
            </li>
        `;

        const logoutBtn = document.getElementById("logoutBtn");
        if (logoutBtn) {
            logoutBtn.addEventListener("click", (e) => {
                e.preventDefault();
                localStorage.removeItem("token");
                localStorage.removeItem("user");
                window.location.href = "/login";
            });
        }

    } else {

        nav.innerHTML = `
            <li class="nav-item">
                <a class="nav-link" href="/login">
                    <i class="fas fa-sign-in-alt"></i> Connexion
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link btn btn-light text-primary px-3 mx-2" href="/register">
                    <i class="fas fa-user-plus"></i> Inscription
                </a>
            </li>
        `;
    }
});
</script>

</body>
</html>
